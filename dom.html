<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="Element">Hello World</div>
    <input type="button" value="change data" onclick="document.getElementById('Element')".innerHtml='Welcome'>
    <input type="button" value="change text color" onclick="document.getElementById('Element')".style.color='red'>
    <input type="button" value="change background color" onclick="document.getElementById('Element')".style.background='yellow'>
    <input type="button" value="change italic" onclick="document.getElementById('Element')".style.italic>
</body>
</html>
