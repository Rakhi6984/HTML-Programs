<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body style="background-color:pink;">
    <h1 style="text-align:center"><b>Student Registration Form</b></h1>
    <form style="text-align:left">
    Roll No.:&nbsp;&nbsp;
    <input type="text" name="rollno"><br><br>
    Student name:&nbsp;&nbsp;
    <input type="text" name="First name" value="First name">
    <input type="text" name="Last name" value="Last name"><br><br>
    Father's name:&nbsp;&nbsp;
    <input type="text" name="Father's name"><br><br>
    Date of birth:&nbsp;&nbsp;
    <input type="text" name="Day" value="Day">-
    <input type="text" name="Month" value="Month">-
    <input type="text" name="Year" value="Year">(DD-MM-YYY)<br><br>
    Mobile no.:&nbsp;&nbsp;
    <input type="text"  value="+91">-
    <input type="number"  name="mobile"><br><br>
    Email id:&nbsp;&nbsp;
    <input type="text" name="Email id"><br><br>
    Password:&nbsp;&nbsp;
    <input type="password" name="password"><br><br>
    Gender:&nbsp;&nbsp;
    <input type="radio" name="gender" value="Male">Male
    <input type="radio" name="gender" value="Female">Female<br><br>
    Department:&nbsp;&nbsp;
    <input type="checkbox" name="department" value="CSE">CSE
    <input type="checkbox" name="department" value="IT">IT
    <input type="checkbox" name="department" value="ECE">ECE
    <input type="checkbox" name="department" value="Civil">Civil
    <input type="checkbox" name="department" value="Mech">Mech<br><br>
    Course:&nbsp;&nbsp;
    <select name="course">
    <option>............Select Current Course's............</option>
    <option value="BCA(AI)">BCA(AI)</option>
    <option value="BCA(Cloud Computing)">BCA(Cloud Computing)</option>
    <option value="MCA">MCA</option>
    <option value="BBA">BBA</option>
    <option value="MBA">MBA</option>
    </select><br><br>
Student photo:&nbsp;&nbsp;
<input type="text" name="Choose file" value="Choose file">No file chosen<br><br>
City:&nbsp;&nbsp;
<input type="text" name="City"><br><br>
Address:&nbsp;&nbsp;
<textarea name="Address" rows="2" cols="20"></textarea><br><br>
<input type="submit" value="Register"
</form>
</body>
</html>
