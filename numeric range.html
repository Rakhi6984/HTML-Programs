<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 style="text-align:center;">Numeric step and range</h2>
    <form>
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" minimum="50" maximum="50" step="5" value="50"><br>
        <label for="volume">Volume(between 0 and 100):</label>
        <input type="range" id="volume" name="volume" minimum="0" maximum="100">
        <input type="telephone" id="Phone" name="Phone" placeholder="(###)########">
        <input type="url" id="URL" name="url" placeholder="http://www.domain name.com">
        <input type="Submit" value="Submit">
    </form>
</body>
</html>
