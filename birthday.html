<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color:aquamarine;">
    <h2 style="text-align:center; color:cadetblue;">Date and Time field</h2>
    <form>
    <label for="birthday">Birthday</label>
    <input type="date" id="Birthday" name="Birthday Date"><br>
    <label for="birthday time">Birthday(date and time):</label>
    <input type="date time-local" id="birthday time" name="birthday time"><br>
    <label for="birthday month">Birthday(month and year):</label>
    <input type="month" id="birthday month" name="birthday month"><br>
    <label for="birthday week">Select a week</label>
    <input type="week" id="birthday week" name="birthday week">
    </form>
</body>
</html>
