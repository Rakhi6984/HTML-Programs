<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var fruits=['apple','banana','orange','kiwi'];
        document.write('Element at 3 index:'+fruits[2]+"<br>");
        fruits.push('grape');
        document.write("Push Operation:"+fruits+"<br>");
        var removedFruit=fruits.pop();
        document.write(removedFruit+"<br>");
        document.write("Pop operation:"+fruits+"<br>");
        for(var i=0;i<fruits.length;i++){
            document.write(fruits[i]+"<br>");
        }
        fruits.forEach(function(fruit){
            document.write(fruit+"<br>")
        });
        var index=fruits.indexOf('orange');
        document.write("index of orange:"+index+"<br>");
        var citrus=fruits.slice(1,3);
        fruits[0]='grapefruit';
        document.write(fruits+"<br>");
        var removedItem=fruits.slice(2,1);
        document.write(removedItem+"<br>");
        document.write(fruits+"<br>");
        var moreFruits=['strawberry','pineapple'];
        var allFruits=fruits.concat(moreFruits);
        document.write(allFruits+"<br>");
    </script>
</body>
</html>
